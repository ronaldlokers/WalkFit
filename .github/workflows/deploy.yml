name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token; only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't run overlapping deploys; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          # Optional integrations stay hidden in the built app if unset. Set as repo
          # Actions variables (Settings > Secrets and variables > Actions). Both proxy
          # URLs point at the same oauth-proxy worker.
          VITE_STRAVA_CLIENT_ID: ${{ vars.VITE_STRAVA_CLIENT_ID }}
          VITE_STRAVA_PROXY_URL: ${{ vars.VITE_STRAVA_PROXY_URL }}
          VITE_WITHINGS_CLIENT_ID: ${{ vars.VITE_WITHINGS_CLIENT_ID }}
          VITE_WITHINGS_PROXY_URL: ${{ vars.VITE_WITHINGS_PROXY_URL }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
